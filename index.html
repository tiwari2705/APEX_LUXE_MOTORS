<!-- 🔥 CRITICAL CSS -->
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#0a0a0a;color:#eaeaea}

/* HEADER */
.header{
position:fixed;
top:0;width:100%;
background:rgba(26,26,26,0.8);
padding:10px 20px;
z-index:1000;
}
.header-container{
display:flex;justify-content:space-between;align-items:center;
}
.logo{color:#c5a059;text-decoration:none;font-weight:700}

/* NAV */
.nav{display:flex;gap:10px;list-style:none;overflow-x:auto}
.nav a{color:#eaeaea;text-decoration:none;font-size:14px}

/* HERO FIXED */
.hero{position:relative;height:100vh}
.hero img{
width:100%;
height:100%;
object-fit:cover;
}
.hero-content{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;
}
.hero h1{font-size:28px}

/* MOBILE FIRST */
@media(min-width:768px){
.hero h1{font-size:48px}
.nav{justify-content:center}
}
</style>

<!-- ✅ NON-BLOCKING CSS -->
